name: zhaoolee
on:
  schedule:
    - cron:  '0 22 * * *'    # 国际标准时间22点（北京时间早上6点发） 
  push:
    branches:    
      - main
      - dev
jobs:
  push:
      runs-on: ${{ matrix.operating-system }}
      strategy:
        matrix:
          # in this example, there is a newer version already installed, 3.7.7, so the older version will be downloaded
          operating-system: ['ubuntu-22.04']
      steps:
      - uses: actions/checkout@v3 # Checking out the repo
      - name: Run with setup-python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          update-environment: false
          cache: 'pipenv'
      - name: Install pipenv
        run: pip3 install --user pipenv
      - name: Install dependecies
        run:  pipenv --python python3 && pipenv install
      - name: Start GARSS Studio RSSHub proxy
        env:
          ACCESS_CODE: banana
          SCHEDULER_ENABLED: "false"
        run: docker compose -f garss-studio/docker-compose.yml up --build -d
      - name: Wait for GARSS Studio
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:25173/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f garss-studio/docker-compose.yml logs
          exit 1
      - name: Build
        env:
            USER: ${{ secrets.USER }}
            PASSWORD: ${{ secrets.PASSWORD }}
            HOST: ${{ secrets.HOST }}
            GARSS_STUDIO_BASE_URL: http://127.0.0.1:25173
            GARSS_STUDIO_ACCESS_CODE: banana
        run: pipenv run build
      - name: Stop GARSS Studio RSSHub proxy
        if: always()
        run: docker compose -f garss-studio/docker-compose.yml down
      - name: Commit and push if changed   # 更新README.md
        run: |
          git diff
          git config --global user.email "zhaoolee@gmail.com"
          git config --global user.name "zhaoolee"
          git add README.md
          git add docs
          git commit -m "Github Action auto Updated"
          git push
